<svg viewBox="0 0 640 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="hazard" width="16" height="16" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
      <rect width="16" height="16" fill="#14171c"/>
      <rect width="8" height="16" fill="#F5A623"/>
    </pattern>
  </defs>

  <!-- Icon badge -->
  <rect x="20" y="20" width="160" height="160" rx="28" fill="#14171c" stroke="#262b33" stroke-width="2"/>

  <!-- Push arrow, moving right, about to be stopped -->
  <line x1="44" y1="100" x2="98" y2="100" stroke="#E8EAED" stroke-width="10" stroke-linecap="round"/>
  <polygon points="96,84 122,100 96,116" fill="#E8EAED"/>

  <!-- Impact marks where the arrow meets the gate -->
  <line x1="128" y1="70" x2="136" y2="82" stroke="#F5A623" stroke-width="4" stroke-linecap="round"/>
  <line x1="128" y1="130" x2="136" y2="118" stroke="#F5A623" stroke-width="4" stroke-linecap="round"/>
  <line x1="140" y1="60" x2="146" y2="76" stroke="#F5A623" stroke-width="3" stroke-linecap="round" opacity="0.7"/>

  <!-- Quarantine gate: two hazard-striped bars, arrow stops here -->
  <rect x="132" y="36" width="14" height="128" rx="3" fill="url(#hazard)" stroke="#0d0f13" stroke-width="1.5"/>
  <rect x="154" y="36" width="14" height="128" rx="3" fill="url(#hazard)" stroke="#0d0f13" stroke-width="1.5"/>

  <!-- Wordmark -->
  <text x="210" y="118" font-family="'JetBrains Mono', 'Fira Code', Consolas, monospace" font-size="58" font-weight="700" letter-spacing="-1">
    <tspan fill="#E8EAED">dead</tspan><tspan fill="#F5A623">push</tspan>
  </text>

  <!-- Tagline -->
  <text x="212" y="148" font-family="'JetBrains Mono', Consolas, monospace" font-size="14" font-weight="500" letter-spacing="2" fill="#6b7280">
    FILE QUARANTINE FOR AI AGENTS
  </text>
</svg>
