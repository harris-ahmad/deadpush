name: "deadpush"
description: "Run deadpush guardian health check and pre-push guardrails on CI"
author: "Harris Ahmad"

inputs:
  hardened:
    description: "Run doctor in hardened mode (if guardian uses privilege separation)"
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - name: Install deadpush
      shell: bash
      run: |
        pip install deadpush

    - name: Run deadpush doctor
      shell: bash
      run: |
        if [ "${{ inputs.hardened }}" = "true" ]; then
          deadpush doctor --hardened
        else
          deadpush doctor
        fi
